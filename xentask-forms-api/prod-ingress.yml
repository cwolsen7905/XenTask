apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  namespace: ws-prod
  name: xentask-forms-api-ingress
spec:
  ingressClassName: webapprouting.kubernetes.azure.com
  rules:
  - host: forms-api.xentask.com
    http:
      paths:
      - backend:
          service:
             name: xentask-forms-api-svc
             port:
               number: 8080
        path: /
        pathType: Prefix
  tls:
    - hosts:
      - forms-api.xentask.com
      secretName: tls-wildcard-xentask
status:
  loadBalancer:
    ingress: