apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  namespace: live-prod
  name: xentask-fe-ingress
  annotations:
    field.cattle.io/creatorId: cwolsen
    nginx.ingress.kubernetes.io/proxy-body-size: 256m
spec:
  ingressClassName: nginx
  rules:
  - host: go.xentask.com
    http:
      paths:
      - backend:
          service:
             name: xentask-fe
             port:
               number: 8080
        path: /
        pathType: ImplementationSpecific
  - host: app.xentask.com
    http:
      paths:
      - backend:
          service:
             name: xentask-fe
             port:
               number: 8080
        path: /
        pathType: ImplementationSpecific
  - host: sys.xentask.com
    http:
      paths:
      - backend:
          service:
             name: xentask-fe
             port:
               number: 8080
        path: /
        pathType: ImplementationSpecific
  tls:
    - hosts:
      - go.xentask.com
      - app.xentask.com
      - sys.xentask.com
      secretName: tls-wildcard-xentask
status:
  loadBalancer:
    ingress:
      - hostname: kube-001.your-domain.com
      - hostname: kube-002.your-domain.com
      - hostname: kube-003.your-domain.com
      - hostname: kube-004.your-domain.com
      - hostname: kube-005.your-domain.com
