name: Build and Deploy

on:
  push:
    branches: [main, dev, staging]

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository_owner }}/xentask-lander

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push Docker image
        uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          platforms: linux/amd64,linux/arm64
          tags: ghcr.io/${{ env.IMAGE_NAME }}:${{ github.ref_name }}

  deploy:
    needs: build
    runs-on: ubuntu-latest
    if: github.ref_name == 'main' || github.ref_name == 'staging' || github.ref_name == 'dev'
    steps:
      - uses: actions/checkout@v4

      - name: Set up kubectl
        uses: azure/setup-kubectl@v3

      - name: Deploy to Kubernetes
        env:
          KUBECONFIG_DATA: ${{ secrets.KUBECONFIG }}
        run: |
          echo "$KUBECONFIG_DATA" > /tmp/kubeconfig
          DEPLOY_FILE="${{ github.ref_name }}-deploy.yml"
          INGRESS_FILE="${{ github.ref_name }}-ingress.yml"
          kubectl --kubeconfig /tmp/kubeconfig apply -f "$DEPLOY_FILE" -f "$INGRESS_FILE"
          kubectl --kubeconfig /tmp/kubeconfig rollout status deployment/xentask-lander
