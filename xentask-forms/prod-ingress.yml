apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  namespace: live-prod
  name: xentask-forms-ingress
spec:
  ingressClassName: webapprouting.kubernetes.azure.com
  rules:
  - host: app.xentask.com
    http:
      paths:
      - backend:
          service:
             name: xentask-forms-svc
             port:
               number: 8080
        path: /
        pathType: ImplementationSpecific
  - host: go.xentask.com
    http:
      paths:
      - backend:
          service:
             name: xentask-forms-svc
             port:
               number: 8080
        path: /
        pathType: ImplementationSpecific
  - host: sys.xentask.com
    http:
      paths:
      - backend:
          service:
             name: xentask-forms-svc
             port:
               number: 8080
        path: /
        pathType: ImplementationSpecific
  tls:
    - hosts:
      - app.xentask.com
      - go.xentask.com
      - sys.xentask.com
      secretName: tls-wildcard-xentask
status:
  loadBalancer:
    ingress:
